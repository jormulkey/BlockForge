<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pro WP Landing Page Generator</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
    .main { display: grid; grid-template-columns: 400px 1fr; gap: 20px; max-width: 1200px; margin: auto; }
    .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    label { display: block; margin-top: 12px; font-weight: 600; font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    #output { width: 100%; height: 700px; font-family: monospace; font-size: 0.8rem; background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="main">
    <div class="panel">
      <h3>Landing Page Builder</h3>
      <div id="fields">
        <!-- Fields will be injected via JS -->
      </div>
      <button id="gen">Generate Landing Page Code</button>
    </div>
    <div class="panel">
      <h3>Gutenberg Code Output</h3>
      <textarea id="output" readonly></textarea>
    </div>
  </div>
  <script>
    const FIELDS = [
      {id: "hero", label: "Hero Title", group: "Hero"}, {id: "sub", label: "Hero Subtitle", group: "Hero"}, {id: "link", label: "Hero Link", group: "Hero"}, {id: "buttontext", label: "Hero Button Text", group: "Hero"},
      {id: "main", label: "Main Title", group: "Main"}, {id: "maintext", label: "Main Text", group: "Main"},
      {id: "col1", label: "Col 1 Title", group: "Three Column"}, {id: "col1text", label: "Col 1 Text", group: "Three Column"}, {id: "col2", label: "Col 2 Title", group: "Three Column"}, {id: "col2text", label: "Col 2 Text", group: "Three Column"}, {id: "col3", label: "Col 3 Title", group: "Three Column"}, {id: "col3text", label: "Col 3 Text", group: "Three Column"},
      {id: "test", label: "Testimonial Title", group: "Testimonials"}, {id: "testtext", label: "Testimonial Text", group: "Testimonials"}, {id: "testcol1title", label: "Quote 1", group: "Testimonials"}, {id: "testcol1text", label: "Quote Name 1", group: "Testimonials"}, {id: "testcol1tit", label: "Quote Title 1", group: "Testimonials"}, {id: "testcol2title", label: "Quote 2", group: "Testimonials"}, {id: "testcol2text", label: "Quote Name 2", group: "Testimonials"}, {id: "testcol2tit", label: "Quote Title 2", group: "Testimonials"}, {id: "testcol3title", label: "Quote 3", group: "Testimonials"}, {id: "testcol3text", label: "Quote Name 3", group: "Testimonials"}, {id: "testcol3tit", label: "Quote Title 3", group: "Testimonials"},
      {id: "port", label: "Portfolio Item", group: "Portfolio"},
      {id: "contacttext", label: "Contact Text", group: "Contact"}, {id: "address", label: "Contact Address", group: "Contact"}, {id: "phone", label: "Contact Phone", group: "Contact"}, {id: "email", label: "Contact Email", group: "Contact"},
    ];

    const fieldsDiv = document.getElementById('fields');
    FIELDS.forEach(f => {
      fieldsDiv.insertAdjacentHTML('beforeend', `<label>${f.label}</label><input id="${f.id}" placeholder="${f.group}">`);
    });

    document.getElementById('gen').onclick = () => {
      const d = {};
      FIELDS.forEach(f => d[f.id] = document.getElementById(f.id).value.trim());

      // Link Verifier
      if (d.link) {
        const urlPattern = /^(https?:\/\/|tel:|mailto:|\/)/;
        if (!urlPattern.test(d.link)) {
          alert("Please enter a valid link (e.g., https://google.com, tel:5551234, or /contact)");
          document.getElementById('link').focus();
          return;
        }
      }

      // Using alignwide for the container
      let html = `<!-- wp:group {"align":"wide","layout":{"type":"constrained"}} --><div class="wp-block-group alignwide">`;

      if(d.hero) html += `<!-- wp:group {"metadata":{"name":"Section"},"align":"full","className":"ext-hero-section is-style-ext-preset\u002d\u002dgroup\u002d\u002dnatural-1\u002d\u002dsection ext-animate\u002d\u002don","style":{"spacing":{"padding":{"top":"0","bottom":"0","left":"0","right":"0"},"margin":{"top":"0","bottom":"0"}}},"backgroundColor":"background","layout":{"inherit":true,"type":"constrained"}} -->
<div class="wp-block-group alignfull ext-hero-section is-style-ext-preset--group--natural-1--section ext-animate--on has-background-background-color has-background" style="margin-top:0;margin-bottom:0;padding-top:0;padding-right:0;padding-bottom:0;padding-left:0"><!-- wp:columns {"align":"full","className":"ext-animate\u002d\u002don","style":{"spacing":{"blockGap":{"top":"0","left":"0"}}}} -->
<div class="wp-block-columns alignfull ext-animate--on"><!-- wp:column {"verticalAlignment":"center","className":"ext-animate\u002d\u002don"} -->
<div class="wp-block-column is-vertically-aligned-center ext-animate--on"><!-- wp:group {"className":"ext-animate\u002d\u002don","style":{"spacing":{"padding":{"top":"var:preset|spacing|30","right":"var:preset|spacing|30","bottom":"var:preset|spacing|30","left":"var:preset|spacing|30"}}},"layout":{"type":"constrained","justifyContent":"right","contentSize":"608px"}} -->
<div class="wp-block-group ext-animate--on" style="padding-top:var(--wp--preset--spacing--30);padding-right:var(--wp--preset--spacing--30);padding-bottom:var(--wp--preset--spacing--30);padding-left:var(--wp--preset--spacing--30)"><!-- wp:heading {"level":1,"className":"ext-animate\u002d\u002don"} -->
<h1 class="wp-block-heading ext-animate--on">${d.hero}</h1>
<!-- /wp:heading -->

<!-- wp:paragraph {"className":"ext-animate\u002d\u002don","style":{"spacing":{"margin":{"top":"24px"}}}} -->
<p class="ext-animate--on" style="margin-top:24px">${d.sub}</p>
<!-- /wp:paragraph -->

<!-- wp:buttons {"className":"ext-animate\u002d\u002don","style":{"spacing":{"blockGap":"1rem","margin":{"top":"var:preset|spacing|40"}}}} -->
<div class="wp-block-buttons ext-animate--on" style="margin-top:var(--wp--preset--spacing--40)"><!-- wp:button {"className":"ext-animate\u002d\u002don is-style-ext-preset\u002d\u002dbutton\u002d\u002dnatural-1\u002d\u002dbutton-1"} -->
<div class="wp-block-button ext-animate--on is-style-ext-preset--button--natural-1--button-1"><a class="wp-block-button__link wp-element-button" href="${d.link}">${d.buttontext}</a></div>
<!-- /wp:button --></div>
<!-- /wp:buttons --></div>
<!-- /wp:group --></div>
<!-- /wp:column -->

<!-- wp:column {"verticalAlignment":"top","className":"ext-animate\u002d\u002don"} -->
<div class="wp-block-column is-vertically-aligned-top ext-animate--on"><!-- wp:cover {"url":"https://images.unsplash.com/photo-1463343232537-7171a89c83f7?fit=crop\u0026amp;crop=entropy%2Cfaces\u0026amp;auto=format%2Ccompress\u0026amp;w=1280","dimRatio":0,"minHeight":70,"minHeightUnit":"vh","isDark":false,"className":"extendify-image-import ext-animate\u002d\u002don"} -->
<div class="wp-block-cover is-light extendify-image-import ext-animate--on" style="min-height:70vh"><img class="wp-block-cover__image-background" alt="" src="https://images.unsplash.com/photo-1463343232537-7171a89c83f7?fit=crop&amp;crop=entropy%2Cfaces&amp;auto=format%2Ccompress&amp;w=1280" data-object-fit="cover"/><span aria-hidden="true" class="wp-block-cover__background has-background-dim-0 has-background-dim"></span><div class="wp-block-cover__inner-container"><!-- wp:spacer {"height":"380px","className":"ext-animate\u002d\u002don"} -->
<div style="height:380px" aria-hidden="true" class="wp-block-spacer ext-animate--on"></div>
<!-- /wp:spacer --></div></div>
<!-- /wp:cover --></div>
<!-- /wp:column --></div>
<!-- /wp:columns --></div>
<!-- /wp:group -->`;

      if(d.main) html += `<!-- wp:group {"metadata":{"name":"Section"},"align":"full","className":"is-style-ext-preset\u002d\u002dgroup\u002d\u002dnatural-1\u002d\u002dsection ext-animate\u002d\u002don","style":{"spacing":{"padding":{"top":"var:preset|spacing|70","bottom":"var:preset|spacing|70"},"margin":{"top":"0","bottom":"0"}}},"backgroundColor":"background","layout":{"inherit":true,"type":"constrained"}} -->
<div class="wp-block-group alignfull is-style-ext-preset--group--natural-1--section ext-animate--on has-background-background-color has-background" style="margin-top:0;margin-bottom:0;padding-top:var(--wp--preset--spacing--70);padding-bottom:var(--wp--preset--spacing--70)"><!-- wp:heading {"textAlign":"center","className":"ext-animate\u002d\u002don"} -->
<h2 class="wp-block-heading has-text-align-center ext-animate--on">${d.main}</h2>
<!-- /wp:heading -->

<!-- wp:paragraph {"align":"center","className":"ext-animate\u002d\u002don","style":{"spacing":{"margin":{"top":"1.5rem"}}}} -->
<p class="has-text-align-center ext-animate--on" style="margin-top:1.5rem">${d.maintext}</p>
<!-- /wp:paragraph --></div>
<!-- /wp:group -->`;

      if(d.col1 || d.col2 || d.col3) html += `<!-- wp:columns {"align":"wide","className":"ext-animate\u002d\u002don","style":{"spacing":{"blockGap":{"top":"var:preset|spacing|40","left":"var:preset|spacing|40"}}}} -->
<div class="wp-block-columns alignwide ext-animate--on"><!-- wp:column {"className":"ext-animate\u002d\u002don"} -->
<div class="wp-block-column ext-animate--on"><!-- wp:group {"metadata":{"name":"Card"},"className":"is-style-ext-preset\u002d\u002dgroup\u002d\u002dnatural-1\u002d\u002ditem-card-1\u002d\u002dalign-center ext-animate\u002d\u002don","layout":{"type":"constrained"}} -->
<div class="wp-block-group is-style-ext-preset--group--natural-1--item-card-1--align-center ext-animate--on"><!-- wp:image {"aspectRatio":"4/3","scale":"cover","className":"extendify-image-import ext-animate\u002d\u002don"} -->
<figure class="wp-block-image extendify-image-import ext-animate--on"><img src="https://images.unsplash.com/photo-1663720409030-db1596ba30a0?fit=crop&amp;crop=entropy%2Cfaces&amp;auto=format%2Ccompress&amp;w=1280" alt="" style="aspect-ratio:4/3;object-fit:cover"/></figure>
<!-- /wp:image -->

<!-- wp:group {"metadata":{"name":"Content"},"className":"is-style-default ext-animate\u002d\u002don","layout":{"type":"constrained"}} -->
<div class="wp-block-group is-style-default ext-animate--on"><!-- wp:heading {"textAlign":"center","level":3,"className":"ext-animate\u002d\u002don"} -->
<h3 class="wp-block-heading has-text-align-center ext-animate--on">${d.col1}</h3>
<!-- /wp:heading -->

<!-- wp:paragraph {"align":"center","className":"ext-animate\u002d\u002don"} -->
<p class="has-text-align-center ext-animate--on">${d.col1text}</p>
<!-- /wp:paragraph --></div>
<!-- /wp:group --></div>
<!-- /wp:group --></div>
<!-- /wp:column -->

<!-- wp:column {"className":"ext-animate\u002d\u002don"} -->
<div class="wp-block-column ext-animate--on"><!-- wp:group {"metadata":{"name":"Card"},"className":"is-style-ext-preset\u002d\u002dgroup\u002d\u002dnatural-1\u002d\u002ditem-card-1\u002d\u002dalign-center ext-animate\u002d\u002don","layout":{"type":"constrained"}} -->
<div class="wp-block-group is-style-ext-preset--group--natural-1--item-card-1--align-center ext-animate--on"><!-- wp:image {"aspectRatio":"4/3","scale":"cover","className":"extendify-image-import ext-animate\u002d\u002don"} -->
<figure class="wp-block-image extendify-image-import ext-animate--on"><img src="https://images.unsplash.com/photo-1658225595905-7bd75d10a265?fit=crop&amp;crop=entropy%2Cfaces&amp;auto=format%2Ccompress&amp;w=1280" alt="" style="aspect-ratio:4/3;object-fit:cover"/></figure>
<!-- /wp:image -->

<!-- wp:group {"metadata":{"name":"Content"},"className":"is-style-default ext-animate\u002d\u002don","layout":{"type":"constrained"}} -->
<div class="wp-block-group is-style-default ext-animate--on"><!-- wp:heading {"textAlign":"center","level":3,"className":"ext-animate\u002d\u002don"} -->
<h3 class="wp-block-heading has-text-align-center ext-animate--on">${d.col2}</h3>
<!-- /wp:heading -->

<!-- wp:paragraph {"align":"center","className":"ext-animate\u002d\u002don"} -->
<p class="has-text-align-center ext-animate--on">${d.col2text}</p>
<!-- /wp:paragraph --></div>
<!-- /wp:group --></div>
<!-- /wp:group --></div>
<!-- /wp:column -->

<!-- wp:column {"className":"ext-animate\u002d\u002don"} -->
<div class="wp-block-column ext-animate--on"><!-- wp:group {"metadata":{"name":"Card"},"className":"is-style-ext-preset\u002d\u002dgroup\u002d\u002dnatural-1\u002d\u002ditem-card-1\u002d\u002dalign-center ext-animate\u002d\u002don","layout":{"type":"constrained"}} -->
<div class="wp-block-group is-style-ext-preset--group--natural-1--item-card-1--align-center ext-animate--on"><!-- wp:image {"aspectRatio":"4/3","scale":"cover","className":"extendify-image-import ext-animate\u002d\u002don"} -->
<figure class="wp-block-image extendify-image-import ext-animate--on"><img src="https://images.unsplash.com/photo-1689852500881-e80588efaed6?fit=crop&amp;crop=entropy%2Cfaces&amp;auto=format%2Ccompress&amp;w=1280" alt="" style="aspect-ratio:4/3;object-fit:cover"/></figure>
<!-- /wp:image -->

<!-- wp:group {"metadata":{"name":"Content"},"className":"is-style-default ext-animate\u002d\u002don","layout":{"type":"constrained"}} -->
<div class="wp-block-group is-style-default ext-animate--on"><!-- wp:heading {"textAlign":"center","level":3,"className":"ext-animate\u002d\u002don"} -->
<h3 class="wp-block-heading has-text-align-center ext-animate--on">${d.col3}</h3>
<!-- /wp:heading -->

<!-- wp:paragraph {"align":"center","className":"ext-animate\u002d\u002don"} -->
<p class="has-text-align-center ext-animate--on">${d.col3text}</p>
<!-- /wp:paragraph --></div>
<!-- /wp:group --></div>
<!-- /wp:group --></div>
<!-- /wp:column --></div>
<!-- /wp:columns -->`;

      if(d.test) html += `<!-- wp:group {"metadata":{"name":"Section"},"align":"full","className":"is-style-ext-preset\u002d\u002dgroup\u002d\u002dnatural-1\u002d\u002dsection","style":{"spacing":{"padding":{"top":"var:preset|spacing|70","bottom":"var:preset|spacing|70"},"margin":{"top":"0","bottom":"0"},"blockGap":"var:preset|spacing|55"}},"backgroundColor":"background","layout":{"inherit":true,"type":"constrained"}} -->
<div class="wp-block-group alignfull is-style-ext-preset--group--natural-1--section has-background-background-color has-background" style="margin-top:0;margin-bottom:0;padding-top:var(--wp--preset--spacing--70);padding-bottom:var(--wp--preset--spacing--70)"><!-- wp:group {"metadata":{"name":"Section Intro"},"align":"wide","className":"ext-is-logical-start","style":{"spacing":{"blockGap":"1.5rem"}},"layout":{"type":"constrained","contentSize":"768px","justifyContent":"left"}} -->
<div class="wp-block-group alignwide ext-is-logical-start"><!-- wp:heading {"className":"ext-animate\u002d\u002don"} -->
<h2 class="wp-block-heading ext-animate--on">${d.test}</h2>
<!-- /wp:heading -->

<!-- wp:paragraph {"className":"ext-animate\u002d\u002don"} -->
<p class="ext-animate--on">${d.testtext}</p>
<!-- /wp:paragraph --></div>
<!-- /wp:group -->

<!-- wp:columns {"align":"wide","style":{"spacing":{"blockGap":{"top":"var:preset|spacing|40","left":"var:preset|spacing|40"}}}} -->
<div class="wp-block-columns alignwide"><!-- wp:column {"className":"ext-animate\u002d\u002don"} -->
<div class="wp-block-column ext-animate--on"><!-- wp:group {"metadata":{"name":"Card","categories":["card"],"patternName":"core/block/2389"},"className":"is-style-ext-preset\u002d\u002dgroup\u002d\u002dnatural-1\u002d\u002ditem-card-1\u002d\u002dalign-start","layout":{"type":"constrained"}} -->
<div class="wp-block-group is-style-ext-preset--group--natural-1--item-card-1--align-start"><!-- wp:group {"metadata":{"name":"Content"},"className":"is-style-default","layout":{"type":"constrained"}} -->
