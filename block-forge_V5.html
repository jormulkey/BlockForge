<!-- START OF FILE block-forge_V5.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlockForge — WP Landing Page Builder & Block Generator (V5)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300..700&family=JetBrains+Mono:wght=400;500&display=swap" rel="stylesheet">
  <style>
    /* Minimal admin UI styles (same as V4) — omitted here for brevity in this listing; the full file keeps original UI CSS */
    :root { --font-body: 'Inter', system-ui, sans-serif; }
    body { font-family: var(--font-body); margin: 0; padding: 16px; background: #f5f4ef; color: #1d1b16; }
    .workspace { max-width: 1200px; margin: 0 auto; }
    .controls { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
    .btn-action { padding:8px 12px; border-radius:6px; border:1px solid #ccc; background:#fff; cursor:pointer; }
    .preview-wrap { border:1px solid #ddd; border-radius:8px; overflow:hidden; height:720px; }
    .preview-iframe { width:100%; height:720px; border:0; }
    .output-code { font-family: 'JetBrains Mono', monospace; background:#fff; padding:12px; border:1px solid #ddd; border-radius:8px; white-space:pre-wrap; max-height:720px; overflow:auto; }
  </style>
</head>
<body>
  <div class="workspace">
    <h1>BlockForge — WP Block Generator (V5)</h1>

    <div class="controls">
      <label>Template: <select id="preset-selector"><option value="roofing">Roofing</option><option value="hvac">HVAC</option></select></label>
      <button class="btn-action" id="btn-manage-sections">Manage Sections</button>
      <button class="btn-action" id="btn-preview">Regenerate Preview</button>
      <button class="btn-action" id="copy-btn">Copy Blocks</button>
      <button class="btn-action" id="btn-toggle-code">Show Code</button>
    </div>

    <div style="display:flex; gap:12px;">
      <div style="flex:1">
        <div class="preview-wrap">
          <iframe id="preview-iframe" class="preview-iframe" title="BlockForge Preview"></iframe>
        </div>
      </div>
      <div style="width:420px;">
        <div id="code-panel" class="output-code" aria-live="polite" style="display:none"></div>
      </div>
    </div>

    <p style="margin-top:8px; font-size:0.9rem; color:#555">Notes: The generated block markup uses native core blocks only. Preview uses an isolated CSS shell so the output code remains clean and compatible with any WordPress theme — no inline styles or theme-specific classes are injected into the exported markup.</p>
  </div>

<script>
// -------------------------------
// Data model (kept simple and theme-friendly)
// -------------------------------
let sectionsOrder = ['hero','main','services','testimonials','portfolio','cta','contact'];

let sectionData = {
  hero: {
    active:true,
    badge: 'Licensed Local Roofers',
    title: 'Protect Your Home With a Lifetime Roof',
    sub: 'Get premium roofing replacements, prompt leak repairs, and expert storm diagnostics from certified home exterior professionals.',
    btn_text: 'Request Free Estimate',
    btn_link: '#contact',
    img: 'https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=800&q=80',
    align: 'right'
  },
  main: { active:true, title:'No-Gimmick Quality & Honest Pricing', text:'We believe in honest craft and clear communication. From our initial inspection to final cleanup, local teams treat your property with respect.' },
  services: { active:true, title:'Our Local Roofing Solutions', s1_title:'Roof Replacement', s1_text:'Upgrade to storm-proof shingle systems.', s1_img:'https://images.unsplash.com/photo-1518736346281-76873166a64a', s2_title:'Emergency Leak Isolation', s2_text:'Stop water in its tracks.', s2_img:'https://images.unsplash.com/photo-1541888946425-d81bb19240f5', s3_title:'Hail Damage Repairs', s3_text:'We specialize in insurance reporting.', s3_img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40' },
  testimonials: { active:true, title:'What Your Neighbors Say About Us', t1_quote:'They isolated the damage and did a superb repair.', t1_name:'Robert K.', t1_role:'Local Resident', t1_img:'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde' },
  portfolio: { active:true, title:'Our Work in the Community', img1:'https://images.unsplash.com/photo-1518736346281-76873166a64a', img2:'https://images.unsplash.com/photo-1635424824849-1b09bdcc55b1', img3:'https://images.unsplash.com/photo-1541888946425-d81bb19240f5' },
  cta: { active:true, title:'Need an Expert Roof Inspection?', sub:'Book a completely free roof inspection today.', btn_text:'Schedule Inspection Now', btn_link:'#contact' },
  contact: { active:true, title:'Get in Touch Today', address:'100 Roofing Way, Springfield, IL', phone:'(555) 321-7663', email:'service@apexroofing.com' }
};

const presets = {
  roofing: JSON.parse(JSON.stringify(sectionData)),
  hvac: JSON.parse(JSON.stringify(sectionData))
};

// -------------------------------
// Generator helpers (produce Gutenberg block comment markup only)
// Keep blocks core-only and minimal so any theme can style them.
// -------------------------------
function escapeHtml(str){
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generateHero(d){
  const title = escapeHtml(d.title);
  const sub = escapeHtml(d.sub);
  const btnText = escapeHtml(d.btn_text);
  const btnLink = escapeHtml(d.btn_link);
  const img = escapeHtml(d.img);

  const textCol = `<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:paragraph {"className":"hero-badge"} -->\n<p class="hero-badge">${escapeHtml(d.badge)}</p>\n<!-- /wp:paragraph -->\n<!-- wp:heading {"level":1} -->\n<h1>${title}</h1>\n<!-- /wp:heading -->\n<!-- wp:paragraph -->\n<p>${sub}</p>\n<!-- /wp:paragraph -->\n<!-- wp:buttons -->\n<div class="wp-block-buttons">\n<!-- wp:button -->\n<div class="wp-block-button"><a class="wp-block-button__link wp-element-button" href="${btnLink}">${btnText}</a></div>\n<!-- /wp:button -->\n</div>\n<!-- /wp:buttons -->\n</div>\n<!-- /wp:column -->`;

  const mediaCol = `<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:image {"url":"${img}","sizeSlug":"large","linkDestination":"none"} -->\n<figure class="wp-block-image size-large"><img src="${img}" alt=""/></figure>\n<!-- /wp:image -->\n</div>\n<!-- /wp:column -->`;

  const content = `<!-- wp:group {"align":"wide","className":"hero-section"} -->\n<div class="wp-block-group alignwide hero-section">\n<!-- wp:columns -->\n<div class="wp-block-columns">\n${d.align==='left'? mediaCol + '\n' + textCol : textCol + '\n' + mediaCol}\n</div>\n<!-- /wp:columns -->\n</div>\n<!-- /wp:group -->`;
  return content;
}

function generateMainText(d){
  return `<!-- wp:group {"align":"wide","className":"intro-section"} -->\n<div class="wp-block-group alignwide intro-section">\n<!-- wp:heading {"textAlign":"center"} -->\n<h2 class="has-text-align-center">${escapeHtml(d.title)}</h2>\n<!-- /wp:heading -->\n<!-- wp:paragraph {"align":"center"} -->\n<p class="has-text-align-center">${escapeHtml(d.text)}</p>\n<!-- /wp:paragraph -->\n</div>\n<!-- /wp:group -->`;
}

function generateServices(d){
  const services = [
    {t:d.s1_title,tx:d.s1_text,img:d.s1_img},
    {t:d.s2_title,tx:d.s2_text,img:d.s2_img},
    {t:d.s3_title,tx:d.s3_text,img:d.s3_img}
  ];

  let cols='';
  services.forEach(s=>{
    cols += `<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:image {"url":"${escapeHtml(s.img)}","sizeSlug":"large","linkDestination":"none"} -->\n<figure class="wp-block-image size-large"><img src="${escapeHtml(s.img)}" alt=""/></figure>\n<!-- /wp:image -->\n<!-- wp:heading {"level":3} -->\n<h3>${escapeHtml(s.t)}</h3>\n<!-- /wp:heading -->\n<!-- wp:paragraph -->\n<p>${escapeHtml(s.tx)}</p>\n<!-- /wp:paragraph -->\n</div>\n<!-- /wp:column -->\n`;
  });

  return `<!-- wp:group {"align":"wide","className":"services-section"} -->\n<div class="wp-block-group alignwide services-section">\n<!-- wp:heading {"textAlign":"center"} -->\n<h2 class="has-text-align-center">${escapeHtml(d.title)}</h2>\n<!-- /wp:heading -->\n<!-- wp:columns -->\n<div class="wp-block-columns">\n${cols}</div>\n<!-- /wp:columns -->\n</div>\n<!-- /wp:group -->`;
}

function generateTestimonials(d){
  const authors = [
    {q:d.t1_quote,n:d.t1_name,r:d.t1_role,img:d.t1_img}
  ];
  let items='';
  authors.forEach(a=>{
    items += `<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:group {"className":"testimonial-card"} -->\n<div class="wp-block-group testimonial-card">\n<!-- wp:paragraph {"className":"testimonial-quote"} -->\n<p>“${escapeHtml(a.q)}”</p>\n<!-- /wp:paragraph -->\n<!-- wp:columns {"className":"testimonial-meta-cols"} -->\n<div class="wp-block-columns testimonial-meta-cols">\n<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:image {"url":"${escapeHtml(a.img)}","sizeSlug":"thumbnail","linkDestination":"none"} -->\n<figure class="wp-block-image size-thumbnail"><img src="${escapeHtml(a.img)}" alt=""/></figure>\n<!-- /wp:image -->\n</div>\n<!-- /wp:column -->\n<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:paragraph {"className":"testimonial-author-name"} -->\n<p><strong>${escapeHtml(a.n)}</strong></p>\n<!-- /wp:paragraph -->\n<!-- wp:paragraph {"className":"testimonial-author-role"} -->\n<p>${escapeHtml(a.r)}</p>\n<!-- /wp:paragraph -->\n</div>\n<!-- /wp:column -->\n</div>\n<!-- /wp:columns -->\n</div>\n<!-- /wp:group -->\n</div>\n<!-- /wp:column -->\n`;
  });

  return `<!-- wp:group {"align":"wide","className":"testimonials-section"} -->\n<div class="wp-block-group alignwide testimonials-section">\n<!-- wp:heading {"textAlign":"center"} -->\n<h2 class="has-text-align-center">${escapeHtml(d.title)}</h2>\n<!-- /wp:heading -->\n<!-- wp:columns -->\n<div class="wp-block-columns">\n${items}</div>\n<!-- /wp:columns -->\n</div>\n<!-- /wp:group -->`;
}

function generatePortfolio(d){
  return `<!-- wp:group {"align":"wide","className":"portfolio-section"} -->\n<div class="wp-block-group alignwide portfolio-section">\n<!-- wp:heading {"textAlign":"center"} -->\n<h2 class="has-text-align-center">${escapeHtml(d.title)}</h2>\n<!-- /wp:heading -->\n<!-- wp:columns -->\n<div class="wp-block-columns">\n<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:image {"url":"${escapeHtml(d.img1)}","sizeSlug":"large","linkDestination":"none"} -->\n<figure class="wp-block-image size-large"><img src="${escapeHtml(d.img1)}" alt=""/></figure>\n<!-- /wp:image -->\n</div>\n<!-- /wp:column -->\n<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:image {"url":"${escapeHtml(d.img2)}","sizeSlug":"large","linkDestination":"none"} -->\n<figure class="wp-block-image size-large"><img src="${escapeHtml(d.img2)}" alt=""/></figure>\n<!-- /wp:image -->\n</div>\n<!-- /wp:column -->\n<!-- wp:column -->\n<div class="wp-block-column">\n<!-- wp:image {"url":"${escapeHtml(d.img3)}","sizeSlug":"large","linkDestination":"none"} -->\n<figure class="wp-block-image size-large"><img src="${escapeHtml(d.img3)}" alt=""/></figure>\n<!-- /wp:image -->\n</div>\n<!-- /wp:column -->\n</div>\n<!-- /wp:columns -->\n</div>\n<!-- /wp:group -->`;
}

function generateCTA(d){
  return `<!-- wp:group {"align":"full","className":"cta-section"} -->\n<div class="wp-block-group alignfull cta-section">\n<!-- wp:heading {"textAlign":"center"} -->\n<h2 class="has-text-align-center">${escapeHtml(d.title)}</h2>\n<!-- /wp:heading -->\n<!-- wp:paragraph {"align":"center"} -->\n<p class="has-text-align-center">${escapeHtml(d.sub)}</p>\n<!-- /wp:paragraph -->\n<!-- wp:buttons -->\n<div class="wp-block-buttons">\n<!-- wp:button -->\n<div class="wp-block-button"><a class="wp-block-button__link wp-element-button" href="${escapeHtml(d.btn_link)}">${escapeHtml(d.btn_text)}</a></div>\n<!-- /wp:button -->\n</div>\n<!-- /wp:buttons -->\n</div>\n<!-- /wp:group -->`;
}

function generateContact(d){
  const parts = [];
  parts.push(`<!-- wp:group {"align":"wide","className":"contact-section"} -->\n<div class="wp-block-group alignwide contact-section">\n<!-- wp:heading {"textAlign":"center"} -->\n<h2 class="has-text-align-center">${escapeHtml(d.title)}</h2>\n<!-- /wp:heading -->`);
  parts.push(`<!-- wp:paragraph -->\n<p>${escapeHtml(d.address)}<br/>${escapeHtml(d.phone)}<br/><a href="mailto:${escapeHtml(d.email)}">${escapeHtml(d.email)}</a></p>\n<!-- /wp:paragraph -->`);
  parts.push(`</div>\n<!-- /wp:group -->`);
  return parts.join('\n');
}

// -------------------------------
// Compose full code from active sections
// -------------------------------
function generateCodeOnly(){
  // Build the block content respecting order and active flags
  const builders = {
    hero: generateHero,
    main: generateMainText,
    services: generateServices,
    testimonials: generateTestimonials,
    portfolio: generatePortfolio,
    cta: generateCTA,
    contact: generateContact
  };

  let out = '';
  sectionsOrder.forEach(id=>{
    const data = sectionData[id];
    if (data && data.active && builders[id]) {
      out += builders[id](data) + '\n\n';
    }
  });
  return out.trim();
}

// -------------------------------
// Preview iframe setup
// -------------------------------
function iframeShellHtml(blocksHtml){
  // The iframe preview includes a small CSS reset and local presentation styles only used for preview.
  // IMPORTANT: These styles are NOT included in generated block code so the export remains theme-agnostic.
  return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{font-family:Inter,system-ui,sans-serif;color:#111}
    body{margin:24px;background:#fff;}
    .wp-block-group{margin-bottom:18px}
    .wp-block-columns{display:flex;gap:16px}
    .wp-block-column{flex:1}
    img{max-width:100%;height:auto;border-radius:6px}
    .wp-block-button__link{display:inline-block;padding:10px 16px;background:#026a71;color:#fff;border-radius:6px;text-decoration:none}
    h1,h2,h3{margin:8px 0}
  </style>
  </head><body>
  <main id="preview-root">${blocksHtml}</main>
  <script>
    // Enable in-place editing in the preview. Edits update the exported code model only (no HTML injection).
    function escapeHtml(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    document.querySelectorAll('[contenteditable]').forEach(el=>{
      el.addEventListener('input', ()=>{
        // send trimmed text content to parent
        parent.postMessage({type:'preview-edit', path: el.dataset ? {section: el.dataset.section, key: el.dataset.key} : null, value: el.textContent}, '*');
      });
    });

    // support double-click on images/links for quick edit — dispatch to parent
    document.querySelectorAll('img').forEach(img=>{ img.addEventListener('dblclick', ()=> parent.postMessage({type:'preview-dbl-image', src: img.src, path: img.dataset ? {section: img.dataset.section, key: img.dataset.key} : null}, '*')) });
    document.querySelectorAll('a').forEach(a=>{ a.addEventListener('dblclick', ()=> parent.postMessage({type:'preview-dbl-link', href: a.href, path: a.dataset ? {section: a.dataset.section, key: a.dataset.key} : null}, '*')) });
  <\/script>
  </body></html>`;
}

function renderPreview(){
  const code = generateCodeOnly();
  const iframe = document.getElementById('preview-iframe');
  const html = iframeShellHtml(code);
  // write into iframe
  const doc = iframe.contentWindow.document;
  doc.open(); doc.write(html); doc.close();
}

// -------------------------------
// Clipboard export: copy pure block comments (no preview CSS)
// -------------------------------
function copyCode(){
  const code = generateCodeOnly();
  // Wrap in a single HTML comment header for clarity (optional)
  const output = code;
  navigator.clipboard.writeText(output).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied ✓';
    setTimeout(()=> btn.textContent = 'Copy Blocks', 2000);
  }).catch(err=>{
    alert('Copy failed: ' + err);
  });
}

// -------------------------------
// Message handling from iframe (in-place edits)
// -------------------------------
window.addEventListener('message', (ev)=>{
  const data = ev.data;
  if (!data || !data.type) return;
  if (data.type === 'preview-edit' && data.path && data.path.section){
    // update model safely
    const sec = data.path.section;
    const key = data.path.key;
    if (sectionData[sec] && key){
      // use text content; no HTML allowed
      sectionData[sec][key] = String(data.value || '').trim();
      // update code panel without regenerating preview to keep user context
      updateCodePanel();
    }
  }
  if (data.type === 'preview-dbl-image'){
    const newUrl = prompt('Enter image URL', data.src || '');
    if (newUrl && data.path && data.path.section && data.path.key){
      sectionData[data.path.section][data.path.key] = newUrl;
      renderPreview(); updateCodePanel();
    }
  }
  if (data.type === 'preview-dbl-link'){
    const newHref = prompt('Enter link URL', data.href || '');
    if (newHref && data.path && data.path.section && data.path.key){
      sectionData[data.path.section][data.path.key] = newHref;
      renderPreview(); updateCodePanel();
    }
  }
});

// -------------------------------
// UI wiring
// -------------------------------
function updateCodePanel(){
  const el = document.getElementById('code-panel');
  const code = generateCodeOnly();
  el.textContent = code;
}

function toggleCodePanel(){
  const el = document.getElementById('code-panel');
  if (el.style.display === 'none' || !el.style.display){
    updateCodePanel(); el.style.display = 'block';
    document.getElementById('btn-toggle-code').textContent = 'Hide Code';
  } else { el.style.display = 'none'; document.getElementById('btn-toggle-code').textContent = 'Show Code'; }
}

// wire controls
document.getElementById('btn-preview').addEventListener('click', ()=>{ renderPreview(); updateCodePanel(); });
document.getElementById('copy-btn').addEventListener('click', copyCode);
document.getElementById('btn-toggle-code').addEventListener('click', toggleCodePanel);
document.getElementById('preset-selector').addEventListener('change', (e)=>{ const p = e.target.value; if (presets[p]) { sectionData = JSON.parse(JSON.stringify(presets[p])); renderPreview(); updateCodePanel(); } });

// initialize
renderPreview(); updateCodePanel();

// Expose for debugging
window._BlockForge = { sectionData, generateCodeOnly, renderPreview };
</script>
</body>
</html>
